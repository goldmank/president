<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scum-pill, .pres-pill, .vice-pill { border-radius: 0.75rem 0.25rem 0.75rem 0.25rem; }
        
        .hand-card {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hand-card:hover {
            transform: translateY(-2.5rem) scale(1.15) rotate(0deg) !important;
            z-index: 100 !important;
        }
        
        /* Perfect semi-circle layout for opponents around center */
        .player-circle-container {
            position: relative;
            width: 320px;
            height: 320px;
        }
        
        /* Positioning logic based on a 320px container center */
        /* Left: 225 deg approx */
        .player-pos-left { top: 35%; left: 0%; transform: translate(-50%, -50%); }
        /* Top Left: 315 deg approx */
        .player-pos-top-left { top: 0%; left: 20%; transform: translate(-50%, -50%); }
        /* Top Center: 0 deg (360) */
        .player-pos-top { top: -15%; left: 50%; transform: translate(-50%, -50%); }
        /* Top Right: 45 deg approx */
        .player-pos-top-right { top: 0%; left: 80%; transform: translate(-50%, -50%); }
        /* Right: 135 deg approx */
        .player-pos-right { top: 35%; left: 100%; transform: translate(-50%, -50%); }
